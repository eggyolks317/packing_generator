<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>packing generator</title>
  </head>
  <body>
    <h1>travel packing list generator</h1>
    <form id="logistics_form" class="flex">
      <label for="api_key">Gemini API Key</label>
      <input
        type="text"
        id="api_key"
        required
        placeholder="enter api key here..."
      />
      <label for="departure">Departure Location</label>
      <input
        id="departure"
        type="text"
        required
        placeholder="enter departure here..."
      />
      <label for="destination">Destination</label>
      <input
        id="destination"
        type="text"
        required
        placeholder="enter destination here..."
      />
      <label for="nationality">Passport Nationality</label>
      <input
        type="text"
        required
        id="nationality"
        placeholder="enter passport nationality here..."
      />
      <label for="travel_date">Travel Date</label>
      <input id="travel_date" type="date" required />
      <label for="travel_days">Travel Days</label>
      <input
        type="number"
        id="travel_days"
        required
        placeholder="enter number of days here..."
      />
      <label for="luggage_size">Luggage Size (inch)</label>
      <input
        type="text"
        id="luggage_size"
        placeholder="enter luggage size (inch)..."
      />
      <button type="submit" id="submit_btn">submit</button>
    </form>
    <div class="hidden" id="result_container">
      <div id="results"></div>
      <div id="result_btns" class="flex">
        <button id="back_btn">Back</button>
        <button id="download_btn">Download as PDF</button>
      </div>
    </div>
  </body>
</html>
